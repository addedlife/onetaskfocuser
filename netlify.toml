[build]
  base = "apps/web"

# Proxy Firebase Auth handler to same origin so iOS Safari's ITP doesn't block
# cross-origin iframe storage — required for signInWithRedirect on mobile.
[[redirects]]
  from = "/__/auth/*"
  to = "https://onetaskonly-app.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true
