[build]
  command = "npm run build && node scripts/copy-shailos-to-dist.cjs"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."gemini-proxy"]
  timeout = 300

[functions."ai-proxy"]
  timeout = 300

# Vite-hashed assets — cache forever (filename changes on every deploy)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# index.html — always re-check so users get latest deploy instantly
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Block private/admin files from public access
[[redirects]]
  from = "/HANDOFF.md"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/DEPLOY_LOG.json"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/pending_restore.json"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/quick_restore.html"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/merge.html"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/recover.html"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/restore_data.html"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/safe-deploy.ps1"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/sync-from-live.ps1"
  to = "/404"
  status = 404
  force = true

[[redirects]]
  from = "/tools/*"
  to = "/404"
  status = 404
  force = true

# Shaila Transcriber SPA — serve its index.html for all sub-routes
[[redirects]]
  from = "/shailos/*"
  to = "/shailos/index.html"
  status = 200
