<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#00796B" />
    <title>Shamash Pro 5</title>
    <!--
      Material Symbols (Rounded) — the icon set the @material/web components and the app draw from.
      `display=block` avoids the brief raw-ligature flash (icon names showing as text) on first paint.
      NOTE: there is deliberately NO global `* { padding: 0 }` reset here. Pro 4 shipped one and it
      clobbered @material/web buttons' shadow-DOM host padding (squished "oval blob" buttons), forcing
      a per-button patch. Pro 5 keeps the base reset scoped and M3-safe (see src/theme/bridge.ts).
    -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
