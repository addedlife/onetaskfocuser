name: Deploy to Firebase

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install frontend deps
        working-directory: apps/web
        run: npm ci

      # GM3 conformance ratchet. Counts Material 3 lint violations and fails only
      # if the count went UP against .gm3-baseline.json. Existing violations are
      # allowed through (there were 1386 at the 2026-07-21 audit); the point is
      # that the number can only go down. Run `npm run gm3:update` after landing
      # fixes to lock the gain in. See CLAUDE.md § GM3 conformance.
      - name: GM3 ratchet
        working-directory: apps/web
        run: npm run gm3

      - name: Build frontend
        working-directory: apps/web
        env:
          GIT_COMMIT: ${{ github.sha }}
        # Shailos is a native component of the web app now (ShailosTracker.jsx) —
        # the old copy-shailos-to-dist iframe payload is no longer shipped.
        run: npm run build

      - name: Install functions deps
        working-directory: apps/web/functions
        run: npm ci

      - name: Write functions .env
        working-directory: apps/web/functions
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> .env
          echo "GEMINI_OVERFLOW_01=${{ secrets.GEMINI_OVERFLOW_01 }}" >> .env
          echo "GEMINI_PAID_01=${{ secrets.GEMINI_PAID_01 }}" >> .env
          echo "PHONE_RELAY_SECRET=${{ secrets.PHONE_RELAY_SECRET }}" >> .env
          echo "PHONE_RELAY_V2_SECRET_WINDOWS=${{ secrets.PHONE_RELAY_V2_SECRET_WINDOWS }}" >> .env
          echo "PHONE_RELAY_V2_SECRET_ANDROID=${{ secrets.PHONE_RELAY_V2_SECRET_ANDROID }}" >> .env
          echo 'ADMIN_SA_JSON=${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}' >> .env
          echo "MCP_READ_TOKEN=${{ secrets.MCP_READ_TOKEN }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo "GOOGLE_CLIENT_SECRET=${{ secrets.GOOGLE_CLIENT_SECRET }}" >> .env
          echo "GOOGLE_HEALTH_CLIENT_ID=${{ secrets.GOOGLE_HEALTH_CLIENT_ID }}" >> .env
          echo "GOOGLE_HEALTH_CLIENT_SECRET=${{ secrets.GOOGLE_HEALTH_CLIENT_SECRET }}" >> .env
          echo "GOOGLE_SEARCH_API_KEY=${{ secrets.GOOGLE_SEARCH_API_KEY }}" >> .env
          echo "GOOGLE_SEARCH_CSE_ID=${{ secrets.GOOGLE_SEARCH_CSE_ID }}" >> .env
          # The GitHub secret is named BRAVE_SEARCH_FOR_SHAILA_RESEARCH (owner created it
          # under that name 7/19); the functions code reads BRAVE_SEARCH_API_KEY — map here.
          echo "BRAVE_SEARCH_API_KEY=${{ secrets.BRAVE_SEARCH_FOR_SHAILA_RESEARCH }}" >> .env
          echo "ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}" >> .env

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase
        working-directory: apps/web
        run: firebase deploy --only hosting,functions,firestore,database,storage --project onetaskonly-app --non-interactive --force
