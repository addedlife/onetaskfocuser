[build]
  command = "npm run build && node scripts/copy-shailos-to-dist.cjs"
  publish = "dist"
  functions = "backend/functions"

[build.environment]
  NODE_VERSION = "20"

[functions]
  node_bundler = "esbuild"

[functions."gemini-proxy"]
  timeout = 300

[functions."ai-proxy"]
  timeout = 300

[functions."mcp"]
  timeout = 60

[functions."phone-relay"]
  timeout = 10

[functions."google-workspace"]
  timeout = 60

[functions."google-health"]
  timeout = 30

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"
    Service-Worker-Allowed = "/"

[[headers]]
  for = "/manifest.webmanifest"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Firebase Auth on our OWN domain. The default authDomain is a shared Google domain
# (onetaskonly-app.firebaseapp.com); serving the sign-in handler cross-domain trips
# modern mobile browsers' anti-tracking storage block, so signInWithRedirect silently
# fails and dumps the user back at login. The documented fix is to set authDomain to
# our domain and proxy the reserved /__/auth/* helper paths back to Firebase. status=200
# is a transparent rewrite (not a 30x), so the browser sees one same-origin round-trip.
[[redirects]]
  from = "/__/auth/*"
  to = "https://onetaskonly-app.firebaseapp.com/__/auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/__/firebase/*"
  to = "https://onetaskonly-app.firebaseapp.com/__/firebase/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/mcp"
  to = "/.netlify/functions/mcp"
  status = 200

[[redirects]]
  from = "/health-callback"
  to = "/index.html"
  status = 200

[[redirects]]
  from = "/shailos/*"
  to = "/shailos/index.html"
  status = 200
