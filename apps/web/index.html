<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Shamash Pro 4</title>
<meta name="application-name" content="Shamash Pro">
<meta name="apple-mobile-web-app-title" content="Shamash Pro">
<script>
/* Canonical sign-in origin. Google's OAuth client authorizes the redirect URI
   https://onetaskonly-app.firebaseapp.com/__/auth/handler (Firebase's default) but NOT
   the .web.app handler, so Google sign-in on *.web.app fails with Error 400
   redirect_uri_mismatch. Until the .web.app redirect URI is added in Google Cloud, send
   web.app visitors to the firebaseapp.com origin (same app, same Firestore data, and a
   SAME-ORIGIN authDomain there so iOS/Android ITP is satisfied). Runs before the bundle,
   the service worker, and any auth attempt; preserves path + query + hash; no-op on every
   other host. */
(function () {
  try {
    if (window.location.hostname === "onetaskonly-app.web.app") {
      window.location.replace(
        "https://onetaskonly-app.firebaseapp.com" +
        window.location.pathname + window.location.search + window.location.hash
      );
    }
  } catch (e) {}
})();
</script>
<meta name="theme-color" content="#00796B">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" href="/fonts/material-symbols-rounded.woff2" as="font" type="font/woff2" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◎</text></svg>">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body,#root{height:100%;overflow:hidden}
body{font-family:'Google Sans','Segoe UI Variable Text','Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility}
:root{
  color-scheme:light dark;
  --pure-radius-sm:8px;
  --pure-radius-md:12px;
  --pure-radius-lg:16px;
  --pure-radius-xl:20px;
  --pure-md3-ease:cubic-bezier(.2,0,0,1);
  --pure-focus:#00796B; /* GV_CLEAN.accent — focus rings match the app teal everywhere (was Google blue) */
}
@keyframes ot-glow{0%{opacity:.3;transform:scale(1)}50%{opacity:.6;transform:scale(1.03)}100%{opacity:.3;transform:scale(1)}}
@keyframes ot-fade{from{opacity:0}to{opacity:1}}
@keyframes ot-zen{from{opacity:0}to{opacity:1}}
@keyframes ot-reveal{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes ot-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes ot-ripple{0%{transform:scale(0.6);opacity:0.8;border-width:6px}100%{transform:scale(2.2);opacity:0;border-width:0px}}
@keyframes ot-pulse-mic{0%{box-shadow:0 0 0 0 rgba(220,60,60,0.4)}70%{box-shadow:0 0 0 12px rgba(220,60,60,0)}100%{box-shadow:0 0 0 0 rgba(220,60,60,0)}}
@keyframes ot-confetti{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
@keyframes ot-nav-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes ot-done-fade{0%{opacity:0;transform:translateY(6px)}30%{opacity:1;transform:translateY(0)}70%{opacity:1}100%{opacity:0;transform:translateY(-4px)}}
@keyframes ot-age-pulse{0%{opacity:.6}50%{opacity:1}100%{opacity:.6}}
@keyframes ot-postit-in{from{opacity:0;transform:scale(0.55) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}
@keyframes ot-fan-out{from{opacity:0;scale:0.3}to{opacity:1;scale:1}}
@keyframes ot-queue-toast{0%{opacity:0;transform:translateX(-50%) translateY(4px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0;transform:translateX(-50%) translateY(-4px)}}
@keyframes ot-postit-scroll{0%{transform:translateY(0)}100%{transform:translateY(-50%)}}
@keyframes ot-slide-in-right{from{transform:translateX(100%)}to{transform:translateX(0)}}
@keyframes ot-comp-flash{0%{opacity:0}15%{opacity:1}70%{opacity:1}100%{opacity:0}}
@keyframes ot-streak{0%{opacity:0;transform:translate(-50%,-50%) scale(.7)}20%{opacity:1;transform:translate(-50%,-50%) scale(1)}75%{opacity:1}100%{opacity:0;transform:translate(-50%,-50%) scale(1.05)}}
input,button,select,textarea{font-family:inherit}
button{
  min-height:36px;
  border-radius:var(--pure-radius-md);
  font-weight:650;
  letter-spacing:0;
  background-clip:padding-box;
  transition:background-color .18s var(--pure-md3-ease),border-color .18s var(--pure-md3-ease),box-shadow .18s var(--pure-md3-ease),transform .12s var(--pure-md3-ease),opacity .18s var(--pure-md3-ease);
  touch-action:manipulation;
}
button:not(:disabled){cursor:pointer}
button:active:not(:disabled){transform:translateY(1px)}
/* Material state layer — uniform hover/press feedback on EVERY button, all surfaces, any
   theme. background-image composes over the button's own background-color without touching
   box-shadow or creating a containing block; mid-gray reads on light and dark themes alike.
   Buttons with their own background-image (gradients) keep theirs via specificity/inline. */
@media(hover:hover){
  button:not(:disabled):hover{background-image:linear-gradient(rgba(127,127,127,.08),rgba(127,127,127,.08))}
}
button:not(:disabled):active{background-image:linear-gradient(rgba(127,127,127,.14),rgba(127,127,127,.14))}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{
  outline:3px solid color-mix(in srgb,var(--pure-focus) 36%,transparent);
  outline-offset:2px;
}
/* Self-hosted icon font (variable: opsz 20..48, wght 400..700, FILL, GRAD). Previously
   loaded from fonts.googleapis.com with display=swap — any slow/failed CDN fetch painted
   every icon as its raw ligature name ("mic", "expand_content") in serif fallback text.
   Same-origin + font-display:block: served/cached by Firebase Hosting and the service
   worker, and ligature text is never painted while the font loads. */
@font-face{
  font-family:'Material Symbols Rounded';
  font-style:normal;
  font-weight:400 700;
  font-display:block;
  src:url('/fonts/material-symbols-rounded.woff2') format('woff2');
}
.material-symbols-rounded{
  font-family:'Material Symbols Rounded';
  font-weight:500;
  font-style:normal;
  font-size:20px;
  line-height:1;
  letter-spacing:0;
  text-transform:none;
  display:inline-flex;
  white-space:nowrap;
  direction:ltr;
  font-feature-settings:'liga';
  -webkit-font-feature-settings:'liga';
  -webkit-font-smoothing:antialiased;
}
svg{shape-rendering:geometricPrecision}
button svg,[role="button"] svg{
  flex-shrink:0;
  stroke-linecap:round;
  stroke-linejoin:round;
  stroke-width:2.25;
}
input,select,textarea{
  border-radius:var(--pure-radius-md);
  letter-spacing:0;
}
/* One scrollbar language everywhere: thin rounded overlay thumb, transparent track
   (same family as the suite's; the suite adds its own hide-until-hover refinement). */
*{scrollbar-width:thin;scrollbar-color:rgba(95,99,104,.35) transparent}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(95,99,104,.38);background-clip:content-box;border:3px solid transparent;border-radius:999px}
::-webkit-scrollbar-thumb:hover{background-color:rgba(95,99,104,.58)}
textarea{resize:vertical}
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>
</body>
</html>
