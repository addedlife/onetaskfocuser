<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Shaila Transcriber — OneTaskFocuser</title>
    <script type="module" crossorigin src="/shailos/assets/index-DO2XAmHP.js"></script>
    <link rel="stylesheet" crossorigin href="/shailos/assets/index-BqYV7l3Y.css">
    <style>
      /* ── OneTask "Claude Cream" theme overrides ── */
      /* Warm parchment background instead of cool slate-50 */
      .bg-slate-50  { background-color: #EDE5D8 !important; }
      .bg-white     { background-color: #F5EFE5 !important; }
      .bg-slate-100 { background-color: #E4DACB !important; }
      .bg-slate-200 { background-color: #D8CEBC !important; }

      /* Indigo → Warm gold accent (matches shaila priority #C8A84C) */
      .bg-indigo-600  { background-color: #C8A84C !important; }
      .bg-indigo-700, .hover\:bg-indigo-700:hover  { background-color: #B89A3C !important; }
      .bg-indigo-100  { background-color: #F0E8D4 !important; }
      .text-indigo-600 { color: #C8A84C !important; }
      .text-indigo-700 { color: #B89A3C !important; }
      .ring-indigo-600 { --tw-ring-color: #C8A84C !important; }
      .border-indigo-200 { border-color: #D8CEBC !important; }
      .focus\:ring-indigo-500:focus { --tw-ring-color: #C8A84C !important; }

      /* Text: warm dark brown instead of cool slate */
      .text-slate-900 { color: #3D3633 !important; }
      .text-slate-800 { color: #3D3633 !important; }
      .text-slate-700 { color: #4A3E38 !important; }
      .text-slate-600 { color: #6E5848 !important; }
      .text-slate-500 { color: #7E6858 !important; }
      .text-slate-400 { color: #9E8878 !important; }

      /* Borders: warm */
      .border-slate-200 { border-color: #D8CEBC !important; }
      .border-slate-300 { border-color: #CCBFAC !important; }
      .divide-slate-200 > * + * { border-color: #D8CEBC !important; }

      /* Hover states */
      .hover\:bg-slate-50:hover  { background-color: #EDE5D8 !important; }
      .hover\:bg-slate-100:hover { background-color: #E4DACB !important; }
      .hover\:bg-slate-200:hover { background-color: #D8CEBC !important; }

      /* Status colors: keep green/red/yellow functional but warm them slightly */
      .bg-green-100 { background-color: #E8EFDB !important; }
      .text-green-700 { color: #4A6430 !important; }
      .bg-amber-100 { background-color: #F0E8D0 !important; }
      .text-amber-700 { color: #8A6820 !important; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #EDE5D8; }
      ::-webkit-scrollbar-thumb { background: #D8CEBC; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #CCBFAC; }

      /* Font family to match OneTask */
      body { font-family: system-ui, -apple-system, sans-serif; }

      /* Subtle shadow warmth */
      .shadow-sm { box-shadow: 0 1px 3px rgba(61, 54, 51, 0.08) !important; }
      .shadow-lg { box-shadow: 0 10px 30px rgba(61, 54, 51, 0.12) !important; }

      /* Back-to-app link */
      .onetask-back {
        position: fixed; bottom: 20px; left: 20px; z-index: 999;
        background: #F5EFE5; border: 1px solid #D8CEBC; border-radius: 12px;
        padding: 8px 14px; font-size: 12px; color: #6E5848;
        text-decoration: none; font-family: system-ui;
        box-shadow: 0 2px 8px rgba(0,0,0,.1);
        transition: background 0.15s;
      }
      .onetask-back:hover { background: #EDE5D8; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <a href="/" class="onetask-back">← Back to OneTask</a>
  </body>
</html>
