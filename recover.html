<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OneTask Data Recovery</title>
  <style>
    body { font-family: system-ui, -apple-system, sans-serif; background: #fff; color: #333; padding: 20px; line-height: 1.5; }
    h1 { font-size: 24px; margin-bottom: 10px; }
    p { margin-bottom: 20px; color: #555; }
    textarea { width: 100%; height: 300px; padding: 10px; font-family: monospace; font-size: 13px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 20px; }
    button { background: #007bff; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 4px; cursor: pointer; display: block; width: 100%; font-weight: bold; }
    button:active { background: #0056b3; }
    .success { color: #28a745; font-weight: bold; margin-top: 10px; display: none; text-align: center; }
  </style>
</head>
<body>

  <h1>Data Recovery</h1>
  <p>If you have data stuck on this device, it should appear below. Copy it and send it to your developer.</p>

  <textarea id="dataBox" readonly></textarea>
  
  <button id="copyBtn" onclick="copyData()">Copy All Data</button>
  <div id="msg" class="success">Copied to clipboard!</div>

  <script>
    function extractData() {
      let result = "--- OneTask LocalStorage Recovery ---\n\n";
      let count = 0;
      for (let i = 0; i < localStorage.length; i++) {
        const key = localStorage.key(i);
        if (key && key.startsWith('onetaskonly_v4')) {
          result += `KEY: ${key}\n`;
          let val = localStorage.getItem(key);
          try {
            // pretty print if JSON
            const parsed = JSON.parse(val);
            result += JSON.stringify(parsed, null, 2);
          } catch(e) {
            result += val; // fallback
          }
          result += "\n\n---------------------------------------\n\n";
          count++;
        }
      }
      
      const box = document.getElementById('dataBox');
      if (count === 0) {
        box.value = "No OneTask data found on this device.\n\nBe sure you are using the same browser (Safari/Chrome) that you used when the data was originally saved.";
      } else {
        box.value = result;
      }
    }

    function copyData() {
      const box = document.getElementById('dataBox');
      box.select();
      box.setSelectionRange(0, 999999); // For mobile devices
      
      try {
        navigator.clipboard.writeText(box.value).then(() => {
          document.getElementById('msg').style.display = 'block';
          setTimeout(() => { document.getElementById('msg').style.display = 'none'; }, 3000);
        });
      } catch(err) {
        // Fallback for older browsers
        document.execCommand('copy');
        document.getElementById('msg').style.display = 'block';
        setTimeout(() => { document.getElementById('msg').style.display = 'none'; }, 3000);
      }
    }

    // Run on load
    extractData();
  </script>
</body>
</html>
